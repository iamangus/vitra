{{range .}}
<div class="file-tree-item">
    {{if .IsDir}}
    <details class="group" {{if .IsOpen}}open{{end}}>
        <summary class="display-flex items-center gap-1 py rounded-md cursor-pointer select-none list-none" style="--py: 1; --gap: 1; padding-left: calc(var(--depth, 0) * 12px);" data-path="{{.Path}}" data-fs>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-60 group-open:rotate-90 transition-transform" style="--opacity: 0.6;">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-70" style="--opacity: 0.7;">
                <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
            </svg>
            <span class="text-sm truncate" style="--font-size: 0.875rem;">{{.Name}}</span>
        </summary>
        <div class="pl-3" style="--pl: 3;">
            {{template "file_tree_children" .Children}}
        </div>
    </details>
    {{else}}
    <a href="/note/{{.Path}}" hx-get="/note/{{.Path}}" hx-target="#main-content" hx-push-url="true" class="display-flex items-center gap-1 py rounded-md text-sm truncate {{if .IsActive}}active{{end}}" style="--py: 1; --gap: 1; --font-size: 0.875rem; padding-left: calc(var(--depth, 0) * 12px + 18px); color: inherit; text-decoration: none;" data-path="{{.Path}}" data-fs>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50" style="--opacity: 0.5;">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
        </svg>
        {{.Name}}
    </a>
    {{end}}
</div>
{{end}}
