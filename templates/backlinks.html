{{if .Backlinks}}
<div class="mt-8">
    <h3 class="text-sm font-semibold uppercase tracking-wide opacity-60 mb-3" style="--opacity: 0.6; --tracking: 0.05em;">
        Backlinks
    </h3>
    <div class="display-flex flex-col gap-1" style="--gap: 1;">
        {{range .Backlinks}}
        <a href="/note/{{.Path}}" hx-get="/note/{{.Path}}" hx-target="#main-content" hx-push-url="true" class="display-flex items-center gap-2 py px rounded-md text-sm" style="--py: 1.5; --px: 2; --gap: 2; text-decoration: none; color: inherit;" data-fs>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-40" style="--opacity: 0.4;">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            {{.Title}}
        </a>
        {{end}}
    </div>
</div>
{{end}}
