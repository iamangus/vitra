{{define "content"}}
<div class="display-flex flex-col items-center justify-center h-full gap-4" style="--gap: 4;">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="opacity-30" style="--opacity: 0.3;">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
    </svg>
    <h2 class="text-xl font-semibold">Note not found</h2>
    <p class="opacity-50" style="--opacity: 0.5;">{{.Path}}</p>
    <a href="/edit/{{.Path}}" hx-get="/edit/{{.Path}}" hx-target="#main-content" hx-push-url="true" class="px py rounded-md text-sm font-medium" style="--px: 4; --py: 2; --bg: var(--color-blue-600); --color: var(--color-white);" data-fs>
        Create this note
    </a>
</div>
{{end}}
